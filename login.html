<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAX Group CRM — Iniciar sesión</title>
  <script src="/vendor/tailwind.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    /* Paleta de marca LAX: acento azul #0000FF + Poppins (igual que la app). */
    tailwind.config = { theme: { extend: {
      colors: { indigo: { 50:'#e8eaff',100:'#c7ccff',200:'#9aa3ff',300:'#6675ff',400:'#3a47ff',500:'#1a22ff',600:'#0000ff',700:'#0000db',800:'#0000ad',900:'#00007a' } },
      fontFamily: { sans: ['Poppins','ui-sans-serif','system-ui','-apple-system','Segoe UI','Roboto','Arial','sans-serif'] }
    } } };
  </script>
  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp .35s ease; }
  </style>
</head>
<body class="min-h-screen bg-slate-900 flex items-center justify-center p-4">

  <div class="fade-up w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-block mb-3">
        <img src="/logo.png" alt="LAX Group" style="height:110px;width:auto;display:block;filter:drop-shadow(0 8px 24px rgba(37,99,235,0.35));" />
      </div>
      <h1 class="text-2xl font-bold text-white">LAX Group CRM</h1>
      <p class="text-slate-400 text-sm mt-1">Gestión de Leads · Facebook Ads</p>
    </div>

    <!-- Card -->
    <div class="bg-slate-800 rounded-2xl p-8 shadow-2xl border border-slate-700">
      <h2 class="text-lg font-semibold text-white mb-6">Iniciar sesión</h2>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Usuario</label>
          <input id="username" type="text" autocomplete="username" required
            class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
            placeholder="tu usuario" />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wide">Contraseña</label>
          <div class="relative">
            <input id="password" type="password" autocomplete="current-password" required
              class="w-full bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all pr-11"
              placeholder="••••••••" />
            <button type="button" id="togglePwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 transition-colors text-sm px-1">
              👁
            </button>
          </div>
        </div>

        <!-- Error -->
        <div id="errorMsg" class="hidden bg-red-900/50 border border-red-700 text-red-300 text-sm px-4 py-3 rounded-xl">
          Usuario o contraseña incorrectos
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl text-sm transition-all shadow-lg disabled:opacity-60 disabled:cursor-not-allowed mt-2">
          Entrar
        </button>
      </form>
    </div>

    <p class="text-center text-slate-600 text-xs mt-6">
      <a id="switchUser" href="#" class="hidden text-slate-500 hover:text-slate-300 transition-colors">← Usar otra cuenta</a>
      <span id="footerBrand">LAX Group CRM</span>
    </p>
  </div>

  <script>
    const form       = document.getElementById('loginForm');
    const errorMsg   = document.getElementById('errorMsg');
    const submitBtn  = document.getElementById('submitBtn');
    const togglePwd  = document.getElementById('togglePwd');
    const pwdInput   = document.getElementById('password');
    const userInput  = document.getElementById('username');
    const switchUser = document.getElementById('switchUser');
    const REMEMBER_KEY = 'lf_user';

    togglePwd.addEventListener('click', () => {
      pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
    });

    // Recordar usuario: prerellenar y enfocar directamente la contraseña.
    try {
      const saved = localStorage.getItem(REMEMBER_KEY);
      if (saved) { userInput.value = saved; switchUser.classList.remove('hidden'); }
    } catch (e) {}

    // "Usar otra cuenta": olvidar el usuario recordado.
    switchUser.addEventListener('click', e => {
      e.preventDefault();
      try { localStorage.removeItem(REMEMBER_KEY); } catch (e) {}
      userInput.value = ''; pwdInput.value = '';
      switchUser.classList.add('hidden');
      userInput.focus();
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      submitBtn.disabled    = true;
      submitBtn.textContent = 'Verificando...';

      const username = userInput.value.trim();
      const password = pwdInput.value;

      try {
        const res  = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (data.ok) {
          // Recordar el usuario (el nombre, nunca la contraseña en claro).
          try { localStorage.setItem(REMEMBER_KEY, username); } catch (e) {}
          // Ofrecer al gestor de contraseñas del navegador guardar la clave
          // de forma segura (autofill en próximos inicios de sesión).
          try {
            if (window.PasswordCredential) {
              const cred = new PasswordCredential({ id: username, password, name: username });
              navigator.credentials.store(cred).catch(() => {});
            }
          } catch (e) {}
          submitBtn.textContent = '✓ Entrando...';
          window.location.href  = '/';
        } else {
          errorMsg.textContent = data.error || 'Usuario o contraseña incorrectos';
          errorMsg.classList.remove('hidden');
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Entrar';
          pwdInput.value = '';
          pwdInput.focus();
        }
      } catch {
        errorMsg.textContent = 'Error de conexión. Verifica que el servidor esté activo.';
        errorMsg.classList.remove('hidden');
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Entrar';
      }
    });

    // Enfoque inteligente: si ya recordamos el usuario, vamos directos a la contraseña.
    if (userInput.value) pwdInput.focus(); else userInput.focus();
  </script>
</body>
</html>
