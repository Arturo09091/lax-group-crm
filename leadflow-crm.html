/* ═══════════════════════ ERROR BOUNDARY ═════════════════════════ */
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
        <div className="bg-slate-800 border border-slate-700 rounded-2xl p-8 max-w-sm w-full text-center">
          <div className="text-4xl mb-4">⚠️</div>
          <h2 className="text-white font-bold text-lg mb-2">Algo salió mal</h2>
          <p className="text-slate-400 text-sm mb-6">Hubo un error al cargar la aplicación. Intentá recargar la página.</p>
          <button onClick={() => window.location.reload()}
            className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-xl text-sm transition-all">
            🔄 Recargar
          </button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function Icon({ name, size = 18, strokeWidth = 2, className = '' }) {

    <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none"

      {ICON_PATHS[name] || null}
    </svg>
  );
}

function StagePill({ stageId, sm }) {

  return (
    <span className={`inline-flex items-center border rounded-full font-medium whitespace-nowrap
      ${sm ? 'text-xs px-2 py-0.5' : 'text-sm px-3 py-1'} ${s.pill}`}>

  );
}

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  const bg = { success:'bg-emerald-600', error:'bg-red-600', info:'bg-indigo-600' }[type] || 'bg-indigo-600';
  const icon = { success:'✓', error:'✗', info:'ℹ' }[type] || 'ℹ';
  return (
    <div className={`anim-toast fixed bottom-6 right-6 z-50 flex items-center gap-3 px-5 py-3 rounded-xl text-white shadow-2xl ${bg}`}>
      <span className="text-lg font-bold">{icon}</span>
      <span className="text-sm font-medium">{msg}</span>
      <button onClick={onClose} className="ml-2 opacity-70 hover:opacity-100 text-lg leading-none">✕</button>
    </div>
  );
}

// Normaliza un teléfono a solo dígitos con prefijo internacional.
// España por defecto: un móvil/fijo de 9 cifras (6/7/8/9...) recibe el 34.
function waDigits(raw) {
  let d = (raw || '').replace(/\D/g, '');
  if (!d) return '';
  if (d.startsWith('00')) d = d.slice(2);                  // 0034… → 34…
  if (d.length === 9 && /^[6789]/.test(d)) d = '34' + d;   // ES sin prefijo
  return d;
}

}

function LeadModal({ lead, onSave, onClose }) {

    onSave({ ...form, id: form.id || uid() });

    <div className="fixed inset-0 z-40 flex items-center justify-center bg-black/50 backdrop-blur-sm" onClick={onClose}>

const CSV_COL_MAP = {
  // name
  name:'name', nombre:'name',
  // phone
  phone:'phone', teléfono:'phone', telefono:'phone', celular:'phone', móvil:'phone', movil:'phone',
  // email
  email:'email', correo:'email',
  // source
  source:'source', fuente:'source',
  // campaign
  campaign:'campaign', campaña:'campaign', campania:'campaign',
  // adset
  adset:'adSet', 'ad set':'adSet', conjunto:'adSet',
  // stage
  stage:'stage', etapa:'stage',
  // value
  value:'value', valor:'value',
  // followUpDate
  followupdate:'followUpDate', 'próx. contacto':'followUpDate', 'prox. contacto':'followUpDate',
  'próximo contacto':'followUpDate', 'proximo contacto':'followUpDate',
  // notes
  notes:'notes', notas:'notes', nota:'notes',
};

function parseCSV(text) {
  const lines = text.replace(/\r/g, '').split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  // Parse a single CSV line respecting quoted fields
  const parseLine = line => {
    const result = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    result.push(cur.trim());
    return result;
  };

  const headers = parseLine(lines[0]).map(h => h.toLowerCase().replace(/^"|"$/g, ''));
  const colMap  = headers.map(h => CSV_COL_MAP[h] || null);

  return lines.slice(1).map(line => {
    const vals = parseLine(line);
    const obj  = {};
    colMap.forEach((field, i) => { if (field) obj[field] = (vals[i] || '').replace(/^"|"$/g, ''); });
    return obj;
  }).filter(r => r.name);
}

function CSVImportModal({ onImport, onClose }) {
  const [step,     setStep]     = useState('upload');  // 'upload' | 'preview'
  const [rows,     setRows]     = useState([]);
  const [filename, setFilename] = useState('');
  const [error,    setError]    = useState('');
  const fileRef = useRef();

  const handleFile = e => {
    const file = e.target.files[0];
    if (!file) return;
    setFilename(file.name);
    const reader = new FileReader();
    reader.onload = ev => {
      const parsed = parseCSV(ev.target.result);
      if (parsed.length === 0) { setError('No se encontraron leads válidos. Asegurate de que el CSV tenga una columna "name" o "nombre".'); return; }
      setError('');
      setRows(parsed);
      setStep('preview');
    };
    reader.readAsText(file, 'UTF-8');
  };

  const confirm = () => onImport(rows);

  const PREVIEW_FIELDS = ['name','phone','email','source','stage'];
  const PREVIEW_LABELS = { name:'Nombre', phone:'Teléfono', email:'Email', source:'Fuente', stage:'Etapa' };

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" onClick={onClose}>
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between p-5 border-b">
          <div>
            <h2 className="text-lg font-bold text-slate-800">Importar leads desde CSV</h2>
            <p className="text-xs text-slate-500 mt-0.5">Columnas soportadas: nombre, teléfono, email, fuente, campaña, etapa, valor, notas</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl font-bold w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100">✕</button>
        </div>

        {step === 'upload' && (
          <div className="p-8 flex flex-col items-center gap-4">
            <div
              onClick={() => fileRef.current.click()}
              className="w-full border-2 border-dashed border-slate-300 hover:border-indigo-400 rounded-2xl p-10 flex flex-col items-center gap-3 cursor-pointer transition-colors group">
              <div className="text-5xl">📂</div>
              <p className="text-slate-600 font-semibold group-hover:text-indigo-600">Haz clic para seleccionar tu archivo CSV</p>
              <p className="text-xs text-slate-400">O arrastrá el archivo aquí</p>
            </div>
            <input ref={fileRef} type="file" accept=".csv,text/csv" className="hidden" onChange={handleFile} />
            {error && <p className="text-sm text-red-600 bg-red-50 border border-red-200 rounded-xl px-4 py-2 w-full">{error}</p>}

            {/* Format hint */}
            <div className="w-full bg-slate-50 rounded-xl p-4 text-xs text-slate-500">
              <p className="font-semibold text-slate-600 mb-1">Formato esperado (primera fila = encabezados):</p>
              <code className="block text-slate-500 overflow-x-auto whitespace-nowrap">nombre, teléfono, email, fuente, campaña, etapa, valor, notas</code>
              <p className="mt-2">También acepta el formato exportado por este sistema.</p>
            </div>
          </div>
        )}

        {step === 'preview' && (
          <>
            <div className="p-4 border-b bg-slate-50 flex items-center justify-between">
              <span className="text-sm text-slate-600">
                <span className="font-bold text-slate-800">{rows.length}</span> leads encontrados en <span className="font-medium">{filename}</span>
              </span>
              <button onClick={() => { setStep('upload'); setRows([]); setFilename(''); }} className="text-xs text-slate-400 hover:text-slate-600 underline">Cambiar archivo</button>
            </div>
            <div className="overflow-auto flex-1">
              <table className="w-full text-sm">
                <thead className="sticky top-0 bg-white border-b">
                  <tr>
                    {PREVIEW_FIELDS.map(f => (
                      <th key={f} className="text-left px-4 py-2.5 text-xs font-semibold text-slate-500 uppercase tracking-wide">{PREVIEW_LABELS[f]}</th>
                    ))}
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {rows.slice(0, 50).map((r, i) => (
                    <tr key={i} className="hover:bg-slate-50">
                      <td className="px-4 py-2 font-medium text-slate-800">{r.name || '—'}</td>
                      <td className="px-4 py-2 text-slate-500">{r.phone || '—'}</td>
                      <td className="px-4 py-2 text-slate-500">{r.email || '—'}</td>
                      <td className="px-4 py-2 text-slate-500">{r.source || '—'}</td>
                      <td className="px-4 py-2">
                        {r.stage
                          ? <StagePill stageId={STAGES.find(s => s.id === r.stage || s.label.toLowerCase() === (r.stage||'').toLowerCase())?.id || 'new'} sm />
                          : <StagePill stageId="new" sm />}
                      </td>
                    </tr>
                  ))}
                  {rows.length > 50 && (
                    <tr><td colSpan={5} className="text-center py-3 text-xs text-slate-400">… y {rows.length - 50} más</td></tr>
                  )}
                </tbody>
              </table>
            </div>
            <div className="p-4 border-t flex gap-3 justify-end">
              <button onClick={onClose} className="px-4 py-2 rounded-xl border text-sm font-medium text-slate-600 hover:bg-slate-50">Cancelar</button>
              <button onClick={confirm}
                className="px-5 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold transition-colors shadow-sm">
                ↑ Importar {rows.length} leads
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function LeadsView({ leads, onEdit, onDelete, onStageChange, onImport, showToast }) {
  const [search,      setSearch]      = useState('');
  const [filterStage, setFilterStage] = useState('all');
  const [filterSrc,   setFilterSrc]   = useState('all');
  const [sortCol,     setSortCol]     = useState('createdAt');
  const [sortDir,     setSortDir]     = useState('desc');
  const [showImport,  setShowImport]  = useState(false);

  const handleImportDone = rows => { onImport(rows); setShowImport(false); };

  const toggleSort = col => {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('desc'); }
  };

  const filtered = leads
    .filter(l => filterStage === 'all' || l.stage === filterStage)
    .filter(l => filterSrc   === 'all' || l.source === filterSrc)
    .filter(l => {
      if (!search) return true;
      const q = search.toLowerCase();
      return [l.name, l.email, l.phone, l.campaign, l.source, l.adSet].some(v => (v || '').toLowerCase().includes(q));
    })
    .sort((a, b) => {
      let va = a[sortCol] ?? '', vb = b[sortCol] ?? '';
      if (sortCol === 'value') { va = +va; vb = +vb; }
      const c = va < vb ? -1 : va > vb ? 1 : 0;
      return sortDir === 'asc' ? c : -c;
    });

  const exportCSV = () => {
    const cols  = ['name','phone','email','source','campaign','adSet','stage','value','createdAt','followUpDate','notes'];
    const heads = ['Nombre','Teléfono','Email','Fuente','Campaña','Ad Set','Etapa','Valor','Fecha entrada','Próx. contacto','Notas'];
    const rows  = filtered.map(l => cols.map(c => `"${(l[c]||'').toString().replace(/"/g,'""')}"`).join(','));
    const csv   = [heads.join(','), ...rows].join('\n');
    const a     = document.createElement('a');
    a.href      = 'data:text/csv;charset=utf-8,' + encodeURIComponent('\uFEFF' + csv);

    a.click();

    <div className="p-4 sm:p-6 anim-fade">

        <div className="flex gap-2 flex-wrap">
          <button onClick={exportCSV}
            className="border border-slate-200 bg-white hover:bg-slate-50 px-4 py-2 rounded-xl text-sm font-medium text-slate-600 transition-colors">
            ↓ Exportar CSV

          <button onClick={() => setShowImport(true)}

        <div className="overflow-x-auto">

                      <button onClick={() => { if (window.confirm(`¿Eliminar a "${l.name}"?`)) onDelete(l.id); }}
                        className="text-slate-300 hover:text-red-500 transition-colors text-base leading-none w-6 h-6 flex items-center justify-center rounded hover:bg-red-50">✕</button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

/* ═══════════════════════════ REPORTS ═══════════════════════════ */

function buildReport(leads, days) {
  const since = new Date(); since.setDate(since.getDate() - days);
  const sinceISO = since.toISOString().split('T')[0];
  const prev = new Date(); prev.setDate(prev.getDate() - days * 2);
  const prevISO = prev.toISOString().split('T')[0];

  const period = leads.filter(l => (l.createdAt || '') >= sinceISO);
  const prevPeriod = leads.filter(l => (l.createdAt || '') >= prevISO && (l.createdAt || '') < sinceISO);

  const total     = period.length;
  const prevTotal = prevPeriod.length;
  const converted = period.filter(l => l.stage === 'converted').length;
  const lost      = period.filter(l => l.stage === 'lost').length;
  const active    = period.filter(l => !['converted','lost'].includes(l.stage)).length;
  const convRate  = total ? Math.round(converted / total * 100) : 0;
  const lostRate  = total ? Math.round(lost / total * 100) : 0;
  const potValue  = period.filter(l => l.stage !== 'lost').reduce((s,l) => s+(+l.value||0), 0);
  const wonValue  = period.filter(l => l.stage === 'converted').reduce((s,l) => s+(+l.value||0), 0);
  const trend     = prevTotal > 0 ? Math.round((total - prevTotal) / prevTotal * 100) : null;
  const overdue   = period.filter(l => isOverdue(l.followUpDate) && !['converted','lost'].includes(l.stage)).length;
  const avgValue  = converted > 0 ? Math.round(wonValue / converted) : 0;

  const byStage = STAGES.map(s => ({
    ...s, count: period.filter(l => l.stage === s.id).length,
    pct: total ? Math.round(period.filter(l => l.stage === s.id).length / total * 100) : 0,
  }));

  const srcMap = {};
  period.forEach(l => { if (l.source) srcMap[l.source] = (srcMap[l.source]||0)+1; });
  const bySrc = Object.entries(srcMap).sort((a,b) => b[1]-a[1]);

  // ── AI-style analysis ──────────────────────────────────────────
  const periodLabel = days === 7 ? 'semana' : days === 15 ? 'quincena' : 'mes';
  let rating, ratingEmoji, ratingBg;
  if      (convRate >= 20) { rating = 'Excelente';          ratingEmoji = '🏆'; ratingBg = 'bg-emerald-50 border-emerald-200 text-emerald-800'; }
  else if (convRate >= 12) { rating = 'Muy bueno';           ratingEmoji = '✅'; ratingBg = 'bg-blue-50 border-blue-200 text-blue-800'; }
  else if (convRate >= 6)  { rating = 'Regular';             ratingEmoji = '📊'; ratingBg = 'bg-yellow-50 border-yellow-200 text-yellow-800'; }
  else if (total === 0)    { rating = 'Sin actividad';        ratingEmoji = '😴'; ratingBg = 'bg-slate-50 border-slate-200 text-slate-600'; }
  else                     { rating = 'Necesita atención';   ratingEmoji = '⚠️'; ratingBg = 'bg-red-50 border-red-200 text-red-800'; }

  const bottleneck = byStage.filter(s => !['converted','lost'].includes(s.id)).reduce((m,s) => s.count > m.count ? s : m, { count:0, label:'—' });
  const bestSrc    = bySrc[0];

  let summary;
  if (total === 0) {
    summary = `No se registraron leads en los últimos ${days} días. Revisá las campañas de captación activas y asegurate de que el webhook de Make está funcionando correctamente.`;
  } else {
    const trendTxt = trend === null ? '' : trend > 0 ? `, un ${trend}% más que el período anterior 📈` : trend < 0 ? `, un ${Math.abs(trend)}% menos que el período anterior 📉` : ', igual que el período anterior';
    summary = `En los últimos ${days} días captaste ${total} lead${total!==1?'s':''}${trendTxt}. De ellos, ${converted} se convirtier${converted!==1?'on':'ó'} en clientes (${convRate}%)${wonValue > 0 ? ` generando ${wonValue.toLocaleString('es-ES')} € en ventas cerradas` : ''}. Hay ${active} lead${active!==1?'s':''} activos con un valor potencial de ${potValue.toLocaleString('es-ES')} €.`;
  }

  const positives = [];
  if (convRate >= 15) positives.push(`Tasa de conversión del ${convRate}% — por encima del promedio del sector (10-15%).`);
  if (trend !== null && trend > 10) positives.push(`Crecimiento del ${trend}% en volumen de leads vs. período anterior.`);
  if (wonValue > 0) positives.push(`${wonValue.toLocaleString('es-ES')} € en ventas cerradas durante este período.`);
  if (bestSrc) positives.push(`"${bestSrc[0]}" es tu mejor fuente con ${bestSrc[1]} lead${bestSrc[1]!==1?'s':''}.`);
  if (overdue === 0 && total > 0) positives.push('Todos los seguimientos están al día — excelente gestión.');
  if (positives.length === 0) positives.push('El sistema está activo y registrando leads correctamente.');

  const issues = [];
  if (overdue > 0) issues.push(`${overdue} lead${overdue!==1?'s tienen':' tiene'} seguimiento vencido — cada día reduce las chances de cerrar.`);
  if (lostRate > 30) issues.push(`Alta tasa de pérdida (${lostRate}%): ${lost} leads descartados. Revisar el proceso de calificación.`);
  if (bottleneck.count > 2) issues.push(`Embudo congestionado en "${bottleneck.label}" con ${bottleneck.count} leads sin avanzar.`);
  if (convRate < 5 && total > 3) issues.push(`Conversión del ${convRate}% es baja. Evaluar calidad de leads entrantes y proceso de venta.`);
  if (trend !== null && trend < -20) issues.push(`Caída del ${Math.abs(trend)}% en leads — revisá el rendimiento de tus campañas.`);
  if (issues.length === 0 && total > 0) issues.push('No se detectaron problemas críticos en este período.');
  if (issues.length === 0 && total === 0) issues.push('Sin leads no hay datos para analizar. Verificá que Make esté enviando los leads al CRM.');

  const recs = [];
  if (overdue > 0) recs.push(`Prioridad #1: contactar hoy los ${overdue} lead${overdue!==1?'s':''} con seguimiento vencido.`);
  if (bottleneck.count > 1) recs.push(`Agendar llamadas para los ${bottleneck.count} leads estancados en "${bottleneck.label}".`);
  if (active > 0) recs.push(`Hay ${potValue.toLocaleString('es-ES')} € en el pipeline activo. Enfocate en cerrarlos antes de captar nuevos.`);
  if (bySrc.length > 1) recs.push(`Invertí más en "${bestSrc[0]}" y analizá el ROI de las demás fuentes.`);
  if (convRate < 10 && total > 0) recs.push('Revisá el script de ventas y el tiempo de respuesta al primer contacto.');
  if (recs.length === 0) recs.push('Mantené el ritmo actual y registrá cada interacción en el CRM.');

  return { total, prevTotal, trend, converted, lost, active, convRate, lostRate, potValue, wonValue, avgValue, overdue, byStage, bySrc, rating, ratingEmoji, ratingBg, summary, positives: positives.slice(0,3), issues: issues.slice(0,3), recs: recs.slice(0,3) };
}

function AdminView({ showToast }) {
  const [users,    setUsers]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [form,     setForm]     = useState({ username:'', name:'', password:'' });
  const [creating, setCreating] = useState(false);
  const [resetting, setResetting] = useState(null); // username being reset
  const [newPwd,   setNewPwd]   = useState('');
  const [newPwd2,  setNewPwd2]  = useState(''); // confirmation
  const [showPwd,  setShowPwd]  = useState(false);
  const HOST = window.location.origin;

  const load = () => {
    setLoading(true);
    fetch('/admin/users').then(r => r.json()).then(data => { setUsers(data); setLoading(false); });
  };

  useEffect(load, []);

  const setF = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleCreate = async e => {
    e.preventDefault();
    if (!form.username || !form.name || !form.password) return;
    setCreating(true);
    const res  = await fetch('/admin/users', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(form) });
    const data = await res.json();
    if (data.ok) {
      showToast(`Usuario "${form.name}" creado`, 'success');
      setForm({ username:'', name:'', password:'' });
      load();
    } else {
      showToast(data.error || 'Error al crear usuario', 'error');
    }
    setCreating(false);
  };

  const handleDelete = async username => {
    if (!confirm(`¿Eliminar al usuario "${username}" y todos sus datos?`)) return;
    const res = await fetch(`/admin/users/${username}`, { method:'DELETE' });
    const data = await res.json();
    if (data.ok) { showToast('Usuario eliminado', 'info'); load(); }
    else showToast(data.error, 'error');
  };

  const handleResetPwd = async username => {
    const pwd = newPwd.trim();
    const pwd2 = newPwd2.trim();
    if (!pwd) { showToast('Escribe una contraseña', 'error'); return; }
    if (pwd.length < 4) { showToast('Mínimo 4 caracteres', 'error'); return; }
    if (pwd !== pwd2) { showToast('Las dos contraseñas no coinciden', 'error'); return; }
    const res  = await fetch(`/admin/users/${username}/reset-password`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ newPassword: pwd }),
    });
    const data = await res.json();
    if (data.ok) {
      showToast(`Contraseña de "${username}" cambiada (${pwd.length} caracteres)`, 'success');
      setResetting(null); setNewPwd(''); setNewPwd2(''); setShowPwd(false);
    } else {
      showToast(data.error || 'Error al cambiar contraseña', 'error');
    }
  };

  const inputCls = "w-full border border-slate-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400";

  return (
    <div className="p-4 sm:p-6 anim-fade max-w-4xl">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-slate-800">Panel de Administración</h1>
        <p className="text-sm text-slate-500 mt-0.5">Gestioná los accesos de tus clientes al CRM</p>
      </div>

      {/* Create user form */}
      <div className="bg-white border rounded-2xl p-6 mb-6">
        <h2 className="font-semibold text-slate-700 mb-4">➕ Crear nuevo cliente</h2>
        <form onSubmit={handleCreate} className="grid grid-cols-1 sm:grid-cols-3 gap-3 items-end">
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Nombre del cliente</label>
            <input value={form.name} onChange={e => setF('name', e.target.value)} className={inputCls} placeholder="Ej: H Group" required />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Usuario (login)</label>
            <input value={form.username} onChange={e => setF('username', e.target.value.toLowerCase().replace(/\s/g,''))} className={inputCls} placeholder="hgroup" required />
          </div>
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Contraseña</label>
            <input value={form.password} onChange={e => setF('password', e.target.value)} className={inputCls} placeholder="Contraseña segura" required />
          </div>
          <div className="col-span-full flex justify-end">
            <button type="submit" disabled={creating}
              className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-xl text-sm font-bold transition-colors disabled:opacity-60">
              {creating ? 'Creando...' : '✓ Crear cliente'}
            </button>
          </div>
        </form>
      </div>

      {/* 30-day summary */}
      {users.filter(u => u.role === 'client').length > 0 && (
        <div className="bg-white border rounded-2xl p-6 mb-6">
          <h2 className="font-semibold text-slate-700 mb-1">📈 Leads últimos 30 días</h2>
          <p className="text-xs text-slate-400 mb-4">Leads ingresados por cliente en el último mes</p>
          <div className="space-y-3">
            {users.filter(u => u.role === 'client').map(u => {
              const maxVal = Math.max(...users.filter(x => x.role === 'client').map(x => x.leadsLast30 || 0), 1);
              const pct = Math.round(((u.leadsLast30 || 0) / maxVal) * 100);
              return (
                <div key={u.username} className="flex items-center gap-3">
                  <div className="w-7 h-7 rounded-full bg-indigo-100 text-indigo-700 flex items-center justify-center text-xs font-bold flex-shrink-0">

function MetaCapiView({ toast }) {
  const [clients, setClients] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [pixelForms, setPixelForms] = React.useState({});
  const [saving, setSaving] = React.useState({});
  const [testFiring, setTestFiring] = React.useState({});
  React.useEffect(() => { loadAll(); }, []);
  async function loadAll() {
    setLoading(true);
    try {
      const r = await fetch('/admin/meta-config');
      const d = await r.json();
      setClients(d);
      const forms = {};
      d.forEach(c => { forms[c.username] = { pixelId: c.pixelConfig?.pixelId||'', accessToken: c.pixelConfig?.accessToken||'', testCode: c.pixelConfig?.testCode||'' }; });
      setPixelForms(forms);
    } catch { toast&&toast('Error cargando', 'error'); }
    setLoading(false);
  }
  async function savePixel(u) {
    setSaving(s=>({...s,[u]:true}));
    try {
      const f=pixelForms[u]||{};
      const r=await fetch('/admin/meta-config/'+u+'/pixel',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pixelId:f.pixelId,accessToken:f.accessToken,testCode:f.testCode})});
      const d=await r.json();
      if(d.ok){toast&&toast('✅ Pixel guardado','success');loadAll();}else toast&&toast(d.error||'Error','error');
    } catch { toast&&toast('Error guardando','error'); }
    setSaving(s=>({...s,[u]:false}));
  }
  async function saveRule(u,sid,ev,en) {
    try {
      const r=await fetch('/admin/meta-config/'+u+'/rule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stageId:sid,metaEvent:ev,enabled:en})});
      const d=await r.json();
      if(d.ok){toast&&toast('✅ Regla guardada','success');loadAll();}else toast&&toast(d.error||'Error','error');
    } catch { toast&&toast('Error','error'); }
  }
  async function delRule(u,sid) {
    try { await fetch('/admin/meta-config/'+u+'/rule/'+sid,{method:'DELETE'}); toast&&toast('Eliminada','success'); loadAll(); } catch {}
  }
  async function testEv(u,ev) {
    const k=u+'_'+ev; setTestFiring(t=>({...t,[k]:true}));
    try {
      const r=await fetch('/admin/meta-config/'+u+'/test-fire',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventName:ev})});
      const d=await r.json();
      if(d.ok) toast&&toast('📡 Evento enviado','success');
      else toast&&toast('Error: '+(d.result?.error?.message||d.error||'?'),'error');
    } catch { toast&&toast('Error','error'); }
    setTestFiring(t=>({...t,[k]:false}));
  }
  const getRule=(rules,sid)=>rules?.find(r=>r.stageId===sid);
  if(loading) return React.createElement('div',{className:'p-8 text-center text-gray-400'},'🔄 Cargando...');
  const E=React.createElement;
  return E('div',{className:'p-4 md:p-6'},
    E('div',{className:'mb-5'},
      E('h1',{className:'text-2xl font-bold text-white'},'\uD83D\uDCE1 API de Conversiones Meta'),
      E('p',{className:'text-gray-400 mt-1 text-sm'},'Configura el Pixel de Meta y asigna eventos a etapas del pipeline. Cuando un lead llegue a esa etapa se dispara el evento automáticamente.')
    ),
    E('div',{className:'flex gap-4 pb-6',style:{overflowX:'auto',minHeight:'60vh'}},
      clients.length===0
        ? E('div',{className:'text-gray-500 p-8'},'No hay clientes creados.')
        : clients.map(c=>E('div',{key:c.username,className:'bg-gray-800 rounded-xl border border-gray-700 flex flex-col',style:{minWidth:'300px',maxWidth:'340px',flexShrink:0}},
          E('div',{className:'bg-gray-700 rounded-t-xl p-3 border-b border-gray-600 flex items-center gap-2'},
            E('div',{className:'w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0',style:{background:'#0000ff'}},c.name[0].toUpperCase()),
            E('div',{className:'flex-1 min-w-0'},
              E('div',{className:'font-semibold text-white text-sm truncate'},c.name),
              E('div',{className:'text-xs text-gray-400'},'@'+c.username)
            ),
            E('span',{className:'text-xs px-2 py-0.5 rounded-full flex-shrink-0 '+(c.pixelConfig?.pixelId?'bg-green-900 text-green-300':'bg-gray-600 text-gray-400')},
              c.pixelConfig?.pixelId?'✅ Pixel':'Sin pixel')
          ),
          E('div',{className:'p-3 flex flex-col gap-4 flex-1 overflow-y-auto'},
            E('div',null,
              E('h3',{className:'text-xs font-bold text-gray-400 uppercase tracking-wide mb-2'},'📌 Pixel & Token'),
              E('input',{className:'w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-xs text-white placeholder-gray-500 mb-1.5',placeholder:'Pixel ID',value:pixelForms[c.username]?.pixelId||'',onChange:e=>setPixelForms(f=>({...f,[c.username]:{...f[c.username],pixelId:e.target.value}}))}),
              E('input',{className:'w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-xs text-white placeholder-gray-500 mb-1.5',placeholder:'Access Token (EAAG...)',type:'password',value:pixelForms[c.username]?.accessToken||'',onChange:e=>setPixelForms(f=>({...f,[c.username]:{...f[c.username],accessToken:e.target.value}}))}),
              E('input',{className:'w-full bg-gray-700 border border-gray-600 rounded px-2 py-1.5 text-xs text-white placeholder-gray-500 mb-2',placeholder:'Test Event Code (opcional)',value:pixelForms[c.username]?.testCode||'',onChange:e=>setPixelForms(f=>({...f,[c.username]:{...f[c.username],testCode:e.target.value}}))}),
              E('button',{className:'w-full py-1.5 rounded text-xs font-semibold '+(saving[c.username]?'bg-gray-600 text-gray-400 cursor-not-allowed':'bg-indigo-600 hover:bg-indigo-700 text-white'),disabled:saving[c.username],onClick:()=>savePixel(c.username)},saving[c.username]?'Guardando...':'💾 Guardar Pixel')
            ),
            E('div',null,
              E('h3',{className:'text-xs font-bold text-gray-400 uppercase tracking-wide mb-2'},'🔀 Etapa → Evento Meta'),
              E('div',{className:'space-y-1.5'},
                                            (c.stageLabels && c.stageLabels.length ? c.stageLabels : PIPELINE_STAGES_CAPI).map(st=>{
                  const rule=getRule(c.stageRules,st.id);
                  return E('div',{key:st.id,className:'bg-gray-700 rounded p-2'},
                    E('div',{className:'flex items-center gap-1 mb-1'},
                      E('span',{className:'text-xs text-gray-300 flex-1 truncate font-medium'},st.label),
                      rule&&E('button',{className:'text-xs text-red-500 hover:text-red-400 px-1',onClick:()=>delRule(c.username,st.id)},'✕')
                    ),
                    E('div',{className:'flex gap-1 items-center'},
                      E('select',{className:'flex-1 bg-gray-600 border border-gray-500 rounded px-1.5 py-1 text-xs text-white',value:rule?.metaEvent||'',onChange:e=>{if(e.target.value)saveRule(c.username,st.id,e.target.value,rule?rule.enabled:true);}},
                        E('option',{value:''},'-- Sin evento --'),
                        META_EVENTS.map(ev=>E('option',{key:ev.id,value:ev.id},ev.label))
                      ),
                      rule&&E('button',{className:'text-xs px-1.5 py-1 rounded font-semibold '+(rule.enabled?'bg-green-700 text-green-200':'bg-gray-600 text-gray-400'),onClick:()=>saveRule(c.username,st.id,rule.metaEvent,!rule.enabled)},rule.enabled?'ON':'OFF')
                    ),
                    rule?.metaEvent&&E('button',{className:'mt-1 w-full text-xs py-0.5 rounded bg-gray-600 hover:bg-gray-500 text-gray-300 disabled:opacity-50',disabled:testFiring[c.username+'_'+rule.metaEvent],onClick:()=>testEv(c.username,rule.metaEvent)},testFiring[c.username+'_'+rule.metaEvent]?'Enviando...':'🧪 Test '+rule.metaEvent)
                  );
                })
              )
            )
          )
        ))
    )
  );
}

function App() {
  const [leads,      setLeads]      = useState(loadLeads);
  const [view,       setView]       = useState('dashboard');
  const [modal,      setModal]      = useState(undefined);
  const [toast,      setToast]      = useState(null);
  const [syncing,    setSyncing]    = useState(false);
  const [lastSync,   setLastSync]   = useState(null);
  const [me,         setMe]         = useState(null);
  const [menuOpen,   setMenuOpen]   = useState(false);
  const [appReady,   setAppReady]   = useState(false);
          const [stageLabels,   setStageLabels]  = useState(STAGES.map(s => ({ id: s.id, label: s.label })));

  const showToast = (msg, type = 'info') => setToast({ msg, type, id: Date.now() });

  // Fetch current user info (role determines what they see)
  useEffect(() => {
    fetch('/api/me').then(r => r.json()).then(data => {
      if (data.username) {
        setMe(data);
        if (data.role === 'admin') setView('admin');
      }
    }).catch(() => {}).finally(() => setAppReady(true));
  }, []);

          // Load custom pipeline stage labels for client
                  useEffect(() => {
                              if (me && me.role === 'client') {
                                              fetch('/api/pipeline-stages').then(r => r.json()).then(data => {
                                                                  if (Array.isArray(data)) setStageLabels(data);
                                                                                  }).catch(() => {});
                                                                                              }
                                                                                                      }, [me]);

                                                                                                              // Helper: get label for a stage id
                                                                                                                      const getStageLabel = (id) => {
                                                                                                                                  const found = stageLabels.find(s => s.id === id);
                                                                                                                                              return found ? found.label : (STAGE[id] ? STAGE[id].label : id);
                                                                                                                                                      };

                                                                                                                                                              // Save custom stage labels (client)
                                                                                                                                                                      const saveStageLabels = async (newLabels) => {
                                                                                                                                                                                  try {
                                                                                                                                                                                                  const r = await fetch('/api/pipeline-stages', {
                                                                                                                                                                                                                      method: 'PUT',
                                                                                                                                                                                                                                          headers: { 'Content-Type': 'application/json' },
                                                                                                                                                                                                                                                              body: JSON.stringify(newLabels)
                                                                                                                                                                                                                                                                              });
                                                                                                                                                                                                                                                                                              if (r.ok) {
                                                                                                                                                                                                                                                                                                                  setStageLabels(newLabels);
                                                                                                                                                                                                                                                                                                                                      showToast('Etapas actualizadas', 'success');
                                                                                                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                                                                                                                  } catch(e) { showToast('Error al guardar', 'error'); }
                                                                                                                                                                                                                                                                                                                                                                          };
  // Pull leads from server (called on mount + every 30s to catch Make webhook leads)
  const syncFromServer = useCallback(async (silent = false) => {
    if (!silent) setSyncing(true);
    try {
      const serverLeads = await api.getLeads();
      // Guard: si la sesión caducó la API devuelve {error:...} (no un array).
      // Nunca metemos un no-array en el estado → la app no puede romperse.
      if (Array.isArray(serverLeads)) {
        setLeads(serverLeads);
        cacheLeads(serverLeads);
        setLastSync(new Date().toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' }));
      }
    } catch {
      // Server unreachable — stay with cached data
    } finally {
      if (!silent) setSyncing(false);
    }
  }, []);

  useEffect(() => {
    syncFromServer();
    const interval = setInterval(() => syncFromServer(true), 30000);
    return () => clearInterval(interval);
  }, [syncFromServer]);

  const openEdit   = lead => setModal(lead);
  const closeModal = () => setModal(undefined);

  const handleSave = async lead => {
    const isEdit = leads.some(l => l.id === lead.id);
    // Optimistic UI update
    setLeads(ls => isEdit ? ls.map(l => l.id === lead.id ? lead : l) : [lead, ...ls]);
    cacheLeads(isEdit ? leads.map(l => l.id === lead.id ? lead : l) : [lead, ...leads]);
    showToast(isEdit ? `Lead "${lead.name}" actualizado` : `Lead "${lead.name}" agregado`, 'success');
    closeModal();
    // Persist to server
    try { await api.upsertLead(lead); } catch {}
  };

  const handleDelete = async id => {
    const lead = leads.find(l => l.id === id);
    setLeads(ls => ls.filter(l => l.id !== id));
    showToast(`Lead "${lead?.name}" eliminado`, 'info');
    try { await api.deleteLead(id); } catch {}
  };

  const handleStageChange = async (id, stage) => {
    const updated = leads.map(l => l.id === id ? { ...l, stage } : l);
    setLeads(updated);
    cacheLeads(updated);
    const lead = updated.find(l => l.id === id);
    try { if (lead) await api.updateLead(lead); } catch {}
  };

  const handleImport = async rows => {
    const stageIds = STAGES.map(s => s.id);
    const newLeads = rows.map(r => ({
      name: r.name || '',
      phone: r.phone || '',
      email: r.email || '',
      source: r.source || 'Otro',
      campaign: r.campaign || '',
      adSet: r.adSet || '',
      stage: stageIds.includes(r.stage)
        ? r.stage
        : (STAGES.find(s => s.label.toLowerCase() === (r.stage||'').toLowerCase())?.id || 'new'),
      value: r.value ? Number(r.value) || 0 : 0,
      followUpDate: r.followUpDate || '',
      notes: r.notes || '',
      id: uid(),
      createdAt: todayISO(),
    }));
    setLeads(ls => [...newLeads, ...ls]);
    cacheLeads([...newLeads, ...leads]);
    showToast(`${newLeads.length} leads importados correctamente`, 'success');
    for (const lead of newLeads) {
      try { await api.upsertLead(lead); } catch {}
    }
  };

  const isAdmin    = me?.role === 'admin';
  const commonProps = { leads, onEdit: openEdit, onDelete: handleDelete, onStageChange: handleStageChange, onImport: handleImport, showToast };

  const viewLabels = { dashboard:'Dashboard', leads:'Leads', pipeline:'Pipeline', reports:'Informes', reminders:'Recordatorios', admin:'Clientes' };

  // Loading screen while we check the session
  if (!appReady) return (
    <div className="min-h-screen bg-slate-900 flex items-center justify-center">
      <div className="text-center">
        <img src="/logo.png" alt="LAX Group" style={{height:'80px',width:'auto',display:'block',margin:'0 auto 16px'}} />
        <div className="text-white font-semibold text-lg">LAX Group CRM</div>
        <div className="text-slate-400 text-sm mt-1 animate-pulse">Cargando...</div>
      </div>
    </div>
  );

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      {me?.impersonatedBy && (
        <div className="no-print bg-amber-500 text-white px-4 py-2 flex items-center justify-between gap-3 flex-shrink-0 shadow-md z-50">
          <div className="flex items-center gap-2 text-sm min-w-0">
            <span className="text-base flex-shrink-0">👁</span>
            <span className="truncate">
              Viendo como <strong>{me.name}</strong> · admin: <strong>{me.impersonatedBy.name}</strong>
            </span>
          </div>
          <button
            onClick={async () => {
              await fetch('/admin/stop-impersonating', { method: 'POST' });
              window.location.href = '/';
            }}
            className="bg-white text-amber-700 hover:bg-amber-50 text-xs font-bold px-3 py-1.5 rounded-lg transition-colors whitespace-nowrap shadow-sm">
            ← Volver al admin
          </button>
        </div>
      )}
      <div className="flex flex-1 overflow-hidden">
      <Sidebar view={view} goTo={setView} leads={leads} syncing={syncing} lastSync={lastSync} me={me}
        isOpen={menuOpen} onClose={() => setMenuOpen(false)} isMobileLayout={true} />

      {/* This div takes all remaining width — on mobile sidebar is fixed so this div uses full width */}
      <div className="flex-1 flex flex-col overflow-hidden min-w-0">
        {/* Mobile top bar */}
        <div className="no-print md:hidden flex items-center justify-between px-4 py-3 bg-slate-900 text-white flex-shrink-0 shadow-md">
          <button onClick={() => setMenuOpen(true)} className="text-slate-300 hover:text-white p-1 -ml-1">
            <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
          <div className="flex items-center gap-2">
            <img src="/logo.png" alt="LAX Group" style={{height:'28px',width:'auto',display:'block',flexShrink:0}} />
            <span className="font-semibold text-sm">{viewLabels[view] || 'LAX Group CRM'}</span>
          </div>
          <div className="flex items-center gap-2">
            <div className={`w-2 h-2 rounded-full ${syncing ? 'bg-indigo-400 animate-pulse' : 'bg-emerald-500'}`} />
            <a href="/auth/logout" title="Cerrar sesión"
              className="text-slate-400 hover:text-red-400 transition-colors p-1 rounded-lg hover:bg-slate-800 text-sm leading-none">
              ⎋
            </a>
          </div>
        </div>

      <main className="flex-1 overflow-y-auto bg-slate-50">
        {view === 'admin'     && <AdminView showToast={showToast} />}
        {view === 'meta-capi' && isAdmin && <MetaCapiView toast={toast} />}
        {view === 'dashboard' && !isAdmin && (
          <Dashboard {...commonProps}
            onOpenNew={() => { setView('leads'); setModal(null); }}
            goTo={setView} />
        )}
        {view === 'leads'     && !isAdmin && <LeadsView     {...commonProps} />}
                    {view === 'pipeline'  && !isAdmin && <PipelineView    {...commonProps} stageLabels={stageLabels} onSaveStageLabels={saveStageLabels} />}
        {view === 'reports'   && !isAdmin && <ReportsView   leads={leads} />}
        {view === 'reminders' && !isAdmin && <RemindersView {...commonProps} />}
      </main>

      {/* Modal */}
      {modal !== undefined && (
        <LeadModal lead={modal} onSave={handleSave} onClose={closeModal} />
      )}

      {/* Toast */}
      {toast && (
        <Toast key={toast.id} msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />
      )}
      </div>{/* end flex-1 column */}
      </div>{/* end sidebar+content row */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
